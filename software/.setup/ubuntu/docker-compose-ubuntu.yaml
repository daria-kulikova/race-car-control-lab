name: "crs"
services:
  crs:
    image: registry.ethz.ch/ics-group/projects/andrea/crs-2.0
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crs
    volumes:
      - .:/code
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev:rw
    devices:
      - /dev/dri:/dev/dri
    environment:
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.docker.xauth
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    expose:
      - "20210-20230/udp"
      - "33300-33400/udp"
    ports:
      - "20210-20230:20210-20230/udp"
      - "33300-33400:33300-33400/udp"
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  # Starts a local NTP server so other machines can sync time.
  ntp:
    image: cturra/ntp
    container_name: ntp
    restart: always
    ports:
      - 123:123/udp
    environment:
      # Serve local time source
      - NTP_SERVERS=127.127.1.1
      - LOG_LEVEL=0
