version: '3'
services:
  crs:
    image: registry.ethz.ch/ics/crs:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crs
    volumes:
      - .:/code
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    env_file:
      - .display
    privileged: true
    security_opt:
      - seccomp:unconfined
    expose:
      - "20210-20230/udp"
    ports:
      - "20210-20230:20210-20230/udp"
