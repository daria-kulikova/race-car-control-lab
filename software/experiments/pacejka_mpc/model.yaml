
# ============ THIS IS THE GROUND TRUTH MODEL FOR SIMULATION ============
# If using ros, paramaters located at /model

# type describes what type of model we want to use / should be loaded
type: "pacejka_discrete"

# Q (process noise covariance matrix)
Q:
  value:
    [
      [0.01, 0, 0, 0, 0, 0],
      [0, 0.01, 0, 0, 0, 0],
      [0, 0, 0.01, 0, 0, 0],
      [0, 0, 0, 0.0001, 0, 0],
      [0, 0, 0, 0, 0.0001, 0],
      [0, 0, 0, 0, 0, 0.0001],
    ]
  is_diag: false

model_params:
  # size params
  lr: 0.038
  lf: 0.052
  m: 0.181
  I: 0.000505

  wheel_radius: 0.0175
  car_width: 0.12

  # lateral force params
  Df: 0.65
  Cf: 1.5
  Bf: 5.2
  Dr: 1.0
  Cr: 1.45
  Br: 8.5

  # longitudinal force params
  Cm1: 0.98028992
  Cm2: 0.01814131

  # friction force params
  Cd0: 0.08518052
  Cd1: 0.01
  Cd2: 0.02750696


  tau: 0.1 # to make this compatible with kinematic model
  eps: 0.2
  gamma: 0.5
